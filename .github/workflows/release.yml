name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]
  # Manual edge build: pick any branch via the "Run workflow" dropdown to
  workflow_dispatch:

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.image.name }} (${{ matrix.platform.name }})
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - {
              name: caby-service,
              context: caby-service,
              dockerfile: caby-service/ci/Dockerfile,
            }
          - {
              name: caby-web,
              context: caby-web,
              dockerfile: caby-web/ci/Dockerfile,
            }
        platform:
          - { name: linux/amd64, pair: linux-amd64, runner: ubuntu-latest }
          - { name: linux/arm64, pair: linux-arm64, runner: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.name }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.pair }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge & push ${{ matrix.image.name }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: caby-service }
          - { name: caby-web }

    steps:
      - name: Resolve target commit
        id: commit
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "short_sha=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "build_ts=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
            name=docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image.name }},enable=${{ github.ref_type == 'tag' }}
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch }}
            type=raw,value=edge-${{ steps.commit.outputs.build_ts }}-${{ steps.commit.outputs.short_sha }},enable=${{ github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Create manifest list & push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ steps.meta.outputs.version }}

  github-release:
    name: GitHub Release
    needs: merge
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
