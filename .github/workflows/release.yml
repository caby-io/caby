name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & push (${{ matrix.image }})
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: caby-service
            context: caby-service
            dockerfile: caby-service/ci/Dockerfile
          - image: caby-web
            context: caby-web
            dockerfile: caby-web/ci/Dockerfile

    steps:
      - name: Resolve target commit
        id: commit
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT
          echo "build_ts=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.commit.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
            name=docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ matrix.image }},enable=${{ github.ref_type == 'tag' }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=edge-${{ steps.commit.outputs.build_ts }}-${{ steps.commit.outputs.short_sha }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  github-release:
    name: GitHub Release
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
