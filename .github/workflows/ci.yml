name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.filter.outputs.service }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service:
              - 'caby-service/**'
              - '.github/workflows/ci.yml'
            web:
              - 'caby-web/**'
              - '.github/workflows/ci.yml'

  service:
    name: Caby Service CI
    needs: changes
    if: needs.changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caby-service
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly Rust toolchain (for rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: caby-service

      - name: Format check
        run: cargo +nightly fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

  web:
    name: Caby Web CI
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: caby-web
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: caby-web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: caby-web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint:ci

      - name: Build
        run: pnpm run build
